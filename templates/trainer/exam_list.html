{% extends base_template %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">{{ batch.batch_name }} Exams</h1>
    <div>
      <a href="{% url 'trainer:exam_create' batch.id %}" class="btn btn-primary">Create Exam</a>
      <a href="{% url 'trainer:assigned_batch_list' %}" class="btn btn-outline-secondary">Batches</a>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped align-middle">
      <thead class="table-light">
        <tr>
          <th>Title</th>
          <th>Date</th>
          <th>Total Marks</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for exam in exams %}
          <tr>
            <td>{{ exam.title }}</td>
            <td>{{ exam.exam_date }}</td>
            <td>{{ exam.total_marks }}</td>
            <td class="text-end">
              <a href="{% url 'trainer:update_exam_results' exam.id %}" class="btn btn-sm btn-outline-success">Results</a>
            </td>
          </tr>
        {% empty %}
          <tr><td colspan="4" class="text-center py-4">No exams found.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
