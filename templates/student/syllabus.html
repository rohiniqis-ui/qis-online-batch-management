{% extends base_template %}

{% block content %}
<div class="container py-4">
  <h1 class="h3 mb-4">Syllabus</h1>
  <div class="card">
    <div class="card-body">
      <p><strong>Batch:</strong> {{ batch|default:"Not assigned" }}</p>
      <p><strong>Course:</strong> {{ batch.course_name|default:"-" }}</p>
      <p><strong>Schedule:</strong> {{ batch.schedule|default:"-" }}</p>
      <p><strong>Progress:</strong> {{ batch.syllabus_progress|default:0 }}%</p>
      <div class="progress">
        <div class="progress-bar" style="width: {{ batch.syllabus_progress|default:0 }}%">{{ batch.syllabus_progress|default:0 }}%</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
