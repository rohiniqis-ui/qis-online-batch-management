{% extends base_template %}

{% block content %}
<div class="container py-4">
  <h1 class="h3 mb-4">Notifications</h1>
  <div class="list-group">
    {% for item in notifications %}
      <div class="list-group-item {% if not item.is_read %}list-group-item-warning{% endif %}">
        <div class="d-flex justify-content-between align-items-start">
          <div><strong>{{ item.title }}</strong><div>{{ item.message }}</div><small>{{ item.created_at }}</small></div>
          {% if not item.is_read %}<a href="{% url 'students:mark_notification_read' item.id %}" class="btn btn-sm btn-outline-primary">Mark read</a>{% endif %}
        </div>
      </div>
    {% empty %}
      <div class="list-group-item text-muted">No notifications found.</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
