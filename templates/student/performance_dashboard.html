{% extends base_template %}

{% block content %}
<div class="container py-4">
  <h1 class="h3 mb-4">Performance Dashboard</h1>
  <div class="row g-4">
    <div class="col-lg-4"><div class="card"><div class="card-body"><h5>Attendance</h5><p>{{ attendance_records.count }} records</p><a href="{% url 'students:attendance_view' %}">View attendance</a></div></div></div>
    <div class="col-lg-4"><div class="card"><div class="card-body"><h5>Assignments</h5><p>{{ assignment_evaluations.count }} evaluated</p><a href="{% url 'students:assignment_status' %}">View assignments</a></div></div></div>
    <div class="col-lg-4"><div class="card"><div class="card-body"><h5>Exams</h5><p>{{ exam_results.count }} results</p><a href="{% url 'students:exam_results' %}">View results</a></div></div></div>
  </div>
</div>
{% endblock %}
